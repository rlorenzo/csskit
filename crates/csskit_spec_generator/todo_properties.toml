# Properties that should be commented out because their parsing rules are tricky.
# Once we figure out how to parse them in csskit_proc_macro/src/def.rs, we can
# remove them from this file and the generator will uncomment them.

[anchor-position]
properties = ["position-try-fallbacks", "position-try"]

[animations]
properties = [
  "animation",
  "animation-trigger-exit-range",
  "animation-trigger-exit-range-end",
  "animation-trigger-exit-range-start",
  "animation-trigger-range",
  "animation-trigger-range-end",
  "animation-trigger-range-start",
  "timeline-trigger",
  "timeline-trigger-range",
  "timeline-trigger-range-end",
  "timeline-trigger-range-start",
  "timeline-trigger-exit-range",
  "timeline-trigger-exit-range-end",
  "timeline-trigger-exit-range-start",
]

[backgrounds]
properties = [
  "background",
  "background-position",
  "background-position-block",
  "background-position-inline",
  "background-position-x",
  "background-position-y",
]

[borders]
properties = [
  "border-color",
  "border-image-width",
  "border-shape",
  "corner-top-left",
  "corner-top-right",
  "corner-bottom-left",
  "corner-bottom-right",
  "corner-start-start",
  "corner-start-end",
  "corner-end-start",
  "corner-end-end",
  "corner-top",
  "corner-left",
  "corner-right",
  "corner-bottom",
  "corner-block-start",
  "corner-block-end",
  "corner-inline-start",
  "corner-inline-end",
  "corner",
  "border-image",
  "border-image-slice",
]

[color-adjust]
