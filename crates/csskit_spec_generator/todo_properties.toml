# Properties that should be commented out because their parsing rules are tricky.
# Once we figure out how to parse them in csskit_proc_macro/src/def.rs, we can
# remove them from this file and the generator will uncomment them.

[animations]
properties = ["animation"]

[backgrounds]
properties = [
  "background",
  "background-position",
  "background-position-block",
  "background-position-inline",
  "background-position-x",
  "background-position-y",
]

[borders]
properties = ["border-image"]

[color-adjust]
properties = ["color-scheme"]

[content]
properties = ["content"]

[fill-stroke]
properties = ["fill", "fill-image", "stroke", "stroke-image"]

[fonts]
properties = [
  "font",
  "font-palette",
  "font-variant",
  "font-variant-alternates",
  # Font properties with complex grammars that cause panics or use unsupported operators like /
  "superscript-size-override",
  "superscript-position-override",
  "ascent-override",
  "line-gap-override",
  "subscript-size-override",
  "descent-override",
  "subscript-position-override",
  "unicode-range",  # Requires UnicodeRangeToken type
  "src",  # Requires FontSrcList type
]

[gcpm]
properties = ["string-set", "copy-into"]

[grid]
properties = [
  "grid",
  "grid-template",
  "grid-template-columns",
  "grid-template-rows",
]

[inline]
properties = ["initial-letter-align"]

[overflow]
properties = ["line-clamp", "text-overflow"]

[speech]
properties = ["speak-as", "voice-pitch", "voice-range"]

[transforms]
properties = ["rotate", "transform-origin"]

[ui]
properties = ["nav-down", "nav-left", "nav-right", "nav-up"]

[variables]
properties = ["--*"]

[pointer-animations]
properties = ["animation-range-center"]

[motion]
properties = ["offset"]
