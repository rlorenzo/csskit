# Returns a map of spec names to property value extensions
#
# Each entry maps a property name to a string that will be appended to its grammar.
# For example, the sizing spec adds " | stretch | fit-content | contain" to width.

[ruby]
# https://drafts.csswg.org/css-ruby-1/#ruby-overhang
# Spec grammar is `auto | spaces` but UAs must also accept `none` as a legacy
# compat value (Chromium source: RubyOverhang::ParseSingleValue). We preserve
# `none` as-is in the AST rather than silently aliasing to `spaces`, since this
# is a build tool that serialises per author intent.
ruby-overhang = " | none"

[display]
# Vendor-prefixed legacy display values used for backwards compatibility with
# older browsers' flex implementations (-webkit-box, -webkit-flex, -ms-flexbox,
# -ms-inline-flexbox).
display = " | <display-legacy-vendor>"

[position]
# -webkit-sticky is a vendor-prefixed alias for `sticky`
position = " | -webkit-sticky"

[sizing]
# https://drafts.csswg.org/css-sizing-4/#sizing-values
width = " | stretch | fit-content | contain | -webkit-max-content | -moz-max-content | -webkit-min-content | -moz-min-content"
max-width = " | stretch | fit-content | contain | -webkit-max-content | -moz-max-content | -webkit-min-content | -moz-min-content"
min-width = " | stretch | fit-content | contain | -webkit-max-content | -moz-max-content | -webkit-min-content | -moz-min-content"
height = " | stretch | fit-content | contain | -webkit-max-content | -moz-max-content | -webkit-min-content | -moz-min-content"
max-height = " | stretch | fit-content | contain | -webkit-max-content | -moz-max-content | -webkit-min-content | -moz-min-content"
min-height = " | stretch | fit-content | contain | -webkit-max-content | -moz-max-content | -webkit-min-content | -moz-min-content"

[text]
# -webkit-match-parent is a vendor-prefixed alias for `match-parent`
text-align = " | -webkit-match-parent"
text-align-all = " | -webkit-match-parent"
